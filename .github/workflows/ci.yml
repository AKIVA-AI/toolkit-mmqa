name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - run: pip install -e ".[dev]"
    - run: pytest --cov=src --cov-report=xml -v
    - uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install bandit safety
    - run: bandit -r src/
    - run: safety check || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install -e ".[dev]"
    - run: ruff check src/ tests/
    - run: pyright src/

  sbom:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Syft
      run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - name: Generate SBOM (CycloneDX)
      run: syft dir:. --output cyclonedx-json=sbom.cdx.json
    - name: Install Grype
      run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    - name: Scan for vulnerabilities
      run: grype sbom:sbom.cdx.json --fail-on critical
    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.cdx.json

  build:
    runs-on: ubuntu-latest
    needs: [test, security, lint, sbom]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
    - run: pip install build
    - run: python -m build
    - name: Verify wheel and sdist exist
      run: ls -la dist/ && test -f dist/*.whl && test -f dist/*.tar.gz

  all-checks:
    if: always()
    needs: [test, security, lint, sbom, build]
    runs-on: ubuntu-latest
    steps:
    - name: Check all jobs
      run: |
        if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
          echo "One or more jobs failed"
          exit 1
        fi
        echo "All checks passed"
